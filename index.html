<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Escape Tribble</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


    <div id="menu-screen">
        <h1>Escape Tribble</h1>
        <div id="start-button">Play Game</div>
    </div>

    <!--Tutorial Section pages-->
    <div id="tutorial" class="hidden">
        <!--back arrow is shown in each image and if clicked moves to the zoomed out image-->
        <div id="master-back-arrow" class="back-arrow hidden"></div>

    <!--Book Drop Pages-->
        <div id="bookDropDoorZoomOutPage" class="fit hidden">
            <img id="bookDropDoorZoomOut" src="bookDropDoorZoomOut.jpeg" alt="Game Room">
            <div id="bookDropDoor-hitbox"></div>
        </div>

        <div id="bookDropDoorZoomInPage" class="fit hidden">
            <img id="bookDropDoorZoomIn" src="bookDropDoorZoomIn.jpeg" alt="Game Room">
            <div id="bookDrop-hitbox"></div>
            <div id="bookDropDoorHandle-hitbox"></div>
        </div>

        <div id="bookDropClosedPage" class="fit hidden">
            <img id="bookDrop" src="bookDrop.jpeg" alt="Game Room">
            <div id="bookDropClosed-hitbox"></div>
        </div>

        <div id="bookDropOpenKeyPage" class="fit hidden">
            <img id="bookDropOpenKey" src="bookDropOpenKey.jpeg" alt="Game Room">
            <div id="bookDropKey-hitbox"></div>
        </div>

        <div id="bookDropOpenPage" class="fit hidden">
            <img id="bookDropOpen" src="bookDropOpen.jpeg" alt="Game Room">
            <div id="bookDropOpen-hitbox"></div>
        </div>

        <div id="bookDropDoorHandlePage" class="fit hidden">
            <img id="bookDropDoorHandle" src="bookDropDoorHandle.jpeg" alt="Game Room">
<!--            <div id="..."></div>-->
        </div>

        <!--fixme change this to menu button and have the quit button in the menu and whatnot-->
        <button id="quit-btn">Exit to main menu</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
