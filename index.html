<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Escape Tribble</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
</head>
<body>


    <!-- Menu Screen -->
    <div id="menu-screen">
        <h1 id="menu-title">Escape Tribble</h1>
        <div class="menu-buttons">
            <div class="menu-btn" id="start-button">Play Game</div>
            <div class="menu-btn" id="settings-button">Settings</div>
            <div class="menu-btn" id="exit-button">Exit</div>
        </div>
    </div>

    <!-- Setting Screen -->
    <div id="settings-screen" class="hidden fade-screen">
        <h2>Settings</h2>
        <!-- FIXME add (?) sound for the game: eg. sound when clicking on buttons, door opening sound, key sound, etc. -->
        <div class="setting-row">
            <label for="music-slider">Music</label>
            <input type="range" id="music-slider" min="0" max="100" value="50">
            <span id="music-value">50</span>
        </div>
        <div class="setting-row">
            <label for="sfx-slider">SFX</label>
            <input type="range" id="sfx-slider" min="0" max="100" value="50">
            <span id="sfx-value">50</span>
        </div>
        <div class="setting-row">
            <label for="fullscreen-toggle"> Fullscreen</label>
            <input type="checkbox" id="fullscreen-toggle">
        </div>
        <div class="menu-btn" id="settings-back-button">Back</div>
    </div>

    <!-- Inventory -->
    <div id="inventory-drawer" class="hidden">
        <div id="inventory-tab">Inventory</div>
        <div id="inventory-panel" class="inventory-closed">
            <div id="inventory-content">
                <div id="inv-bd-key" class="inv-item hidden" title="Book Drop Key">
                    <span class="emoji-icon">🗝️</span>
                    <span class="inv-label">BD Key</span>
                </div>
                <div id="inv-fb-key" class="inv-item hidden" title="Fish Book Key">
                    <span class="emoji-icon">🗝️</span>
                    <span class="inv-label">FB Key</span>
                </div>
                <div id="inv-pw-book" class="inv-item hidden" title="Projector Wall Book">
                    <span class="emoji-icon">📙</span>
                    <span class="inv-label">PW Book</span>
                </div>
                <div id="inv-pw-book-key" class="inv-item hidden" title="Projector Wall Book Key">
                    <span class="emoji-icon">🗝️</span>
                    <span class="inv-label">PW Key</span>
                </div>
                <div class="inv-item empty"></div>
                <div class="inv-item empty"></div>
            </div>
        </div>
    </div>

    <!--Tutorial Section pages-->
    <div id="tutorial" class="hidden">
        <!--back arrow is shown in each image and if clicked moves to the zoomed out image-->
        <div id="master-back-arrow" class="back-arrow hidden"></div>

        <!--Naming Convention: zone and then optionally: state of area/item, type of object-->
    <!--Book Drop Pages-->
        <div id="bd-main-page" class="fit hidden">
            <img id="bd-main" src="bookDropDoorZoomOut.jpeg" alt="Game Room">
            <div id="bd-door-hitbox"></div>
        </div>

        <div id="bd-door-page" class="fit hidden">
            <img id="bd-door" src="bookDropDoorZoomIn.jpeg" alt="Game Room">
            <div id="bd-slot-hitbox"></div>
            <div id="bd-handle-hitbox"></div>
        </div>

        <div id="bd-slot-closed-page" class="fit hidden">
            <img id="bd-slot-closed" src="bookDrop.jpeg" alt="Game Room">
            <div id="bd-closed-hitbox"></div>
        </div>

        <div id="bd-slot-open-key-page" class="fit hidden">
            <img id="bd-slot-open-key" src="bookDropOpenKey.jpeg" alt="Game Room">
            <div id="bd-key-hitbox"></div>
        </div>

        <div id="bd-slot-open-page" class="fit hidden">
            <img id="bd-slot-open" src="bookDropOpen.jpeg" alt="Game Room">
            <div id="bd-slot-open-hitbox"></div>
        </div>

        <div id="bd-door-handle-page" class="fit hidden">
            <img id="bd-door-handle" src="bookDropDoorHandle.jpeg" alt="Game Room">
            <div id="bd-door-keyhole-hitbox"></div>
            <div id="bd-door-handle-hitbox"></div>
        </div>

        <div id="bd-door-open-page" class="fit hidden">
            <img id="bd-door-open" src="bookDropDoorOpen.jpeg" alt="Game Room">
            <div id="bd-back-door-hitbox"></div>
            <div id="bd-cart-hitbox"></div>
        </div>

        <div id="bd-cart-page" class="fit hidden">
            <img id="bd-cart" src="bookDropCart.jpeg" alt="Game Room">
            <div id="bd-books-hitbox"></div>
        </div>

        <!-- fb= fish book -->
        <div id="bd-books-page" class="fit hidden">
            <img id="bd-books" src="bookDropCartZoom.jpeg" alt="Game Room">
            <div id="bd-fb-hitbox"></div>
        </div>

        <div id="bd-fb-open-key-page" class="fit hidden">
            <img id="bd-fb-open-key" src="bookDropFishBookOpenKey.jpeg" alt="Game Room">
            <div id="bd-fb-key-hitbox"></div>
        </div>

        <div id="bd-fb-open-page" class="fit hidden">
            <img id="bd-fb-open" src="bookDropFishBookOpen.jpeg" alt="Game Room">
            <div id="bd-fb-open-hitbox"></div>
        </div>

        <div id="bd-back-door-handle-page" class="fit hidden">
            <img id="bd-back-door-handle" src="bd-back-door-handle.jpeg" alt="Game Room">
            <div id="bd-back-handle-keyhole-hitbox"></div>
            <div id="bd-back-handle-handle-hitbox"></div>
        </div>

        <div id="bd-back-door-open-page" class="fit hidden">
            <img id="bd-back-door-open" src="bd-back-door-open.jpeg" alt="Game Room">
            <div id="bd-back-door-open-hitbox"></div>
            <div id="bd-back-door-enter-hitbox"></div>
        </div>

        <!-- pr = projector room -->
        <div id="pr-steps-page" class="fit hidden">
            <img id="pr-steps" src="pr-steps.jpeg" alt="Game Room">
            <div id="pr-steps-enter-hitbox"></div>
            <!-- fixme - add forward arrow to move forward -->
        </div>

        <div id="pr-main-page" class="fit hidden">
            <img id="pr-main" src="pr-main.jpeg" alt="Game Room">
            <div id="pr-pw-hitbox"></div>
            <!-- fixme - add hitbox for the wire section -->
        </div>

        <!-- pw = projector wall; hb = hole with book-->
        <div id="pr-pw-main-book-page" class="fit hidden">
            <img id="pr-pw-main-book" src="pr-pw-main-book.jpeg" alt="Game Room">
            <div id="pr-pw-hb-hitbox"></div>
            <!-- fixme - add hitbox for other stuff -->
        </div>

        <!-- pw = projector wall; he = hole empty-->
        <div id="pr-pw-main-noBook-page" class="fit hidden">
            <img id="pr-pw-main-noBook" src="pr-pw-main-noBook.jpeg" alt="Game Room">
            <div id="pr-pw-he-hitbox"></div>
            <!-- fixme - add hitbox for other stuff -->
        </div>

        <div id="pr-pw-hole-book-page" class="fit hidden">
            <img id="pr-pw-hole-book" src="pr-pw-hole-book.jpeg" alt="Game Room">
            <div id="pr-pw-hole-book-hitbox"></div>
        </div>

        <div id="pr-pw-hole-noBook-page" class="fit hidden">
            <img id="pr-pw-hole-noBook" src="pr-pw-hole-noBook.jpeg" alt="Game Room">
            <div id="pr-pw-hole-noBook-hitbox"></div>
        </div>

        <!-- In-Game Hamburger Menu -->
        <div id="hamburger-menu" class="hidden">
            <div id="hamburger-icon">
                <div class="hamburger-line"></div>
                <div class="hamburger-line"></div>
                <div class="hamburger-line"></div>
            </div>
            <div id="hamburger-dropdown" class="dropdown-closed">
                <div class="dropdown-item" id="restart-btn">Restart</div>
                <div class="dropdown-item" id="quit-btn">Exit to Main Menu</div>
            </div>
        </div>

        <!-- Hint Button -->
        <div id="hint-btn" class="hidden">?</div>

        <!-- Hint Display Box -->
        <div id="hint-box" class="hint-closed hidden">
            <p id="hint-text">Hints will appear here once they are added to the game.</p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
